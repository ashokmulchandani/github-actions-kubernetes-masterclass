name: Code Quality

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run Go Vet (find bugs)
        run: |
          cd backend
          go vet ./...
      - name: Run Staticcheck (code quality)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          cd backend
          staticcheck ./...
