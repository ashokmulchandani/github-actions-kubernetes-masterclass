# HPA: Auto-scale backend based on CPU usage
#
# How it works:
#   CPU < 70%  → keep current replicas (minimum 1)
#   CPU > 70%  → add more pods (up to maximum 5)
#   CPU drops  → remove extra pods (back to minimum 1)
#
# Example:
#   1 pod at 80% CPU → HPA adds 1 more pod → now 2 pods at 40% each
#   Traffic drops     → HPA removes 1 pod  → back to 1 pod

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: skillpulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
