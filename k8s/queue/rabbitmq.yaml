# RabbitMQ - Message Queue
# Think of it as a post office:
#   - Backend drops letters (messages) into mailbox
#   - Workers pick up letters and deliver them
#   - If worker is busy, letters wait safely in the mailbox

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: skillpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "skillpulse"
            - name: RABBITMQ_DEFAULT_PASS
              value: "skillpulse123"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
# Service: Access RabbitMQ
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: skillpulse
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
