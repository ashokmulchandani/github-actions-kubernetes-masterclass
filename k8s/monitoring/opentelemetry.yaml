# =============================================================================
# OpenTelemetry Collector + Jaeger (Request Tracing)
# =============================================================================
#
# WHY OpenTelemetry?
#
# Prometheus tells you: "Backend got 500 requests/sec, CPU at 70%"
# Loki tells you: "Error: connection timeout at 12:03:45"
# 
# But NEITHER tells you:
#   "User Ashok's request took 3 seconds because:
#    - 50ms in frontend
#    - 200ms in backend
#    - 2700ms stuck waiting for MySQL (THIS is the problem!)"
#
# OpenTelemetry + Jaeger gives you that EXACT breakdown per request.
#
# Think of it like:
#   Prometheus = speedometer (how fast overall)
#   Loki = dashcam (what happened)
#   Jaeger = GPS tracker (where exactly did this ONE delivery get stuck)
#
# Flow:
#   Your app (instrumented with OpenTelemetry)
#     → sends traces to OpenTelemetry Collector
#     → Collector routes to Jaeger (storage + UI)
#     → You view in Jaeger UI: "Request #123 spent 2.7s in MySQL"
#
# =============================================================================

# --- Jaeger (stores and displays traces) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: skillpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
# Service: Jaeger UI (view traces in browser)
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: skillpulse
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30086
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# --- OpenTelemetry Collector (receives traces from app, sends to Jaeger) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: skillpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:latest
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol/
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
# Service: OpenTelemetry Collector (app sends traces here)
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: skillpulse
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# ConfigMap: OpenTelemetry Collector configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: skillpulse
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger]
