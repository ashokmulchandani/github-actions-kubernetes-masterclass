# ConfigMap: Grafana data sources
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: skillpulse
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki:3100
---
# Deployment: Grafana dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: skillpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
# Service: Access Grafana
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: skillpulse
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
